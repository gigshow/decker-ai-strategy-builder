# Decker 오퍼레이션 룰북 (YAML, 시그널 상태·상의 매칭용)
# tier: basic(3~4) | standard(6~8) | premium(10+)
# 공개 미러: 운영 정본·최신 변경은 Decker 플랫폼 저장소를 따른다. 본 레포에서는 docs/architecture.md,
# docs/model.md, operation 개요를 참고한다 (내부 전용 경로·파일명은 주석에 적지 않음).

version: "2.3.2"
updated: "2026-03-21"
# v2.3.2: C2-b 배치2 — portfolio, entry_timing, tf_alignment, swing_state, portfolio_default YAML choices.
# v2.3.1: C2-b 배치1 — progress_* / progress_80_trend / TF·range 진행도 룰 전부 YAML choices (dict는 폴백용 유지).
# v2.3.0: C2-a — 일부 룰에 YAML choices 인라인 (target_reached, stop_hit, default). 로더·resolve_choices_for_rule YAML 우선.
# v2.2.0: 상의 choices를 오퍼레이션 룰 id와 정합 (operation_choice_profiles, 매칭 rule_id 단일 소스)
# v2.1.0: entry_timing 레이어 추가 (predictive, signal, confirmation)
#         레이어 순서 재정비 (9개 레이어: status/portfolio/entry_timing/tf_alignment/swing_state/market_state/tf_specific/progress/fallback)
# v2.0.0: tf_alignment 레이어 추가 (counter_trend, lower_aligned, fully_aligned, transition)
#         swing_state 레이어 추가 (A/B/C 스윙 타입 기반 규칙)
# v1.4.0: market_state 조건 추가 (breakout_early, pullback, range, trend)
# v1.3.1: portfolio_default에 portfolio_context_required 추가
# v1.3.0: 시그널 스펙 기반 샘플 확장 (progress 90/95, 1h/1d TF, 33/40, risk high)
# v1.2.0: v4 포트폴리오 스킬

rules:

  # ══════════════════════════════════════════════════
  # 레이어 1: STATUS (우선 처리 — 항상 먼저 매칭)
  # ══════════════════════════════════════════════════
  - id: target_reached
    tier: basic
    status: target_reached
    strategy: "목표 도달. 전량 청산 권장."
    choices:
      - action: full_close
        description: "전량 청산"

  - id: stop_hit
    tier: basic
    status: stop_hit
    strategy: "손절 구간. 청산 또는 관망 권장."
    choices:
      - action: full_close
        description: "전량 청산"
      - action: wait
        description: "관망"

  # ══════════════════════════════════════════════════
  # 레이어 2: PORTFOLIO (비중 기반 — status 다음 우선)
  # ══════════════════════════════════════════════════
  - id: portfolio_overweight
    tier: premium
    weight_diff_min: 0.10
    strategy: "비중 초과. 목표 대비 초과분 매도 권장."
    choices:
      - action: trim
        description: "초과 비중 매도"
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: full_close
        description: "전량 청산"

  - id: portfolio_underweight
    tier: premium
    weight_diff_max: -0.10
    progress_min: 50
    strategy: "비중 미달. 시그널 진행 50%+ 시 추가 매수 검토."
    choices:
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: hold
        description: "목표까지 홀드"
      - action: wait
        description: "관망"

  - id: portfolio_signal_80
    tier: premium
    weight_diff_min: -0.05
    weight_diff_max: 0.05
    progress_min: 80
    strategy: "비중 적정. 80% 진행. 50% 부분 익절 제안."
    choices:
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 3: ENTRY TIMING (v2.0.0 신규 — 진입 타이밍 모드)
  # predictive(예측): 오브젝트 형성 중 선점. 리스크 높음.
  # signal(신호): S 라벨 발생 시 표준 진입.
  # confirmation(확인): 스윙 테스트 통과 후 안전 진입.
  # entry_timing이 user_context에 없으면 이 레이어 스킵 → 하위 레이어로 fallthrough
  # ══════════════════════════════════════════════════

  # [예측 진입] predictive — 역추세에서 소규모 선점
  - id: predictive_counter_trend
    tier: premium
    entry_timing: predictive
    tf_alignment: counter_trend
    progress_min: 0
    progress_max: 30
    strategy: "예측 진입 + 역추세. 신호 미확정 구간. 소규모(1~2%). 손절 타이트. S 신호 발생 시 재평가 후 추가 진입 또는 청산."
    choices:
      - action: wait
        description: "관망"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"

  # [예측 진입] predictive — 전환 구간 선점
  - id: predictive_transition
    tier: premium
    entry_timing: predictive
    tf_alignment: transition
    strategy: "예측 진입 + 전환 구간. 상위 TF 방향 전환 가능성. 소규모(2~3%) 선점. 전환 확인 시 스케일인."
    choices:
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: wait
        description: "관망"
      - action: full_close
        description: "전량 청산"

  # [신호 진입] signal — 전 TF 정렬 표준 진입
  - id: signal_fully_aligned
    tier: standard
    entry_timing: signal
    tf_alignment: fully_aligned
    strategy: "신호 진입 + 전 TF 정렬. 표준 포지션(5~8%). 진행도 기반 룰북 적용. 강한 홀드 권장."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 30
        description: "30% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # [신호 진입] signal — 역추세 소규모 진입
  - id: signal_counter_trend
    tier: premium
    entry_timing: signal
    tf_alignment: counter_trend
    strategy: "신호 진입 + 역추세. S 신호 확인됐으나 상위 TF 반대. 소규모(2~3%). 상위 TF 저항 이전 청산 계획 필수."
    choices:
      - action: partial_take_profit
        pct: 25
        description: "25% 부분 익절"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"

  # [확인 진입] confirmation — 테스트 통과 후 안전 진입
  - id: confirmation_entry
    tier: standard
    entry_timing: confirmation
    tf_alignment: [fully_aligned, lower_aligned]
    strategy: "확인 진입. 스윙 테스트 통과 후 진입. 리스크 낮음. 포지션 표준~확대 가능. 목표까지 홀드."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 20
        description: "20% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 4: TF ALIGNMENT (v2.0.0 신규 — 다중 TF 맥락 기반)
  # 신호 TF 대비 상위 TF 방향 정렬 상태에 따른 전략
  # 포지션 크기 및 청산 타이밍 차별화
  # ══════════════════════════════════════════════════

  # [역추세] counter_trend — 고진행도: 신속 청산
  - id: counter_trend_exit_fast
    tier: premium
    tf_alignment: counter_trend
    progress_min: 60
    strategy: "역추세 신호 60%+. 상위 TF 저항 근접 구간. 즉각 60~70% 청산 권장. 나머지 손절 타이트하게 조정."
    choices:
      - action: partial_take_profit
        pct: 65
        description: "65% 부분 익절"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"
    # 해석: 1h A+ 신호이나 4h/1d A- 중. 60%면 상위 TF 저항가 도달 가능성 높음

  # [역추세] counter_trend — 초중기 진행: 모니터링
  - id: counter_trend_hold_monitor
    tier: premium
    tf_alignment: counter_trend
    progress_min: 0
    progress_max: 59
    strategy: "역추세 초기~중기. 상위 TF A- 구간 B/C 파동 반등 중. 목표가가 상위 TF 매도 저항가 이하인지 확인 필수. 홀드하되 상위 TF C스윙 전환 여부 지속 모니터링."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"
      - action: wait
        description: "관망"
    # 해석: 아직 목표까지 여유 있으나 상위 TF 방향이 반대. 매우 조심스러운 홀드.

  # [전환 구간] transition — 상위 TF C스윙(전환 테스트) 진행 중
  - id: transition_scale_in
    tier: premium
    tf_alignment: transition
    progress_min: 30
    strategy: "상위 TF C 연결스윙 전환 구간. 하위 TF 신호 유효. 초기 소규모 진입 유지. 상위 TF A+ 전환 확인 시 포지션 점진적 증가(스케일인) 검토."
    choices:
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"
    # 해석: 4h이 A-에서 C스윙 진입 = 4h 방향 전환 테스트 중. 유망하지만 미확인.

  - id: transition_early
    tier: premium
    tf_alignment: transition
    progress_min: 0
    progress_max: 29
    strategy: "상위 TF 전환 초입. 신호 초기 진입 구간. 소규모(2~3%) 선진입. 상위 TF 전환 확인 전 포지션 증가 금지."
    choices:
      - action: wait
        description: "관망"
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: full_close
        description: "전량 청산"

  # [하위 TF 정렬] lower_aligned — 직상위 정렬, 더 큰 TF 반대
  - id: lower_aligned_high_progress
    tier: standard
    tf_alignment: lower_aligned
    progress_min: 66
    strategy: "하위 TF 정렬 / 상위 TF 반대. 66%+. 상위 TF 저항 근접 가능. 40% 부분 익절. 나머지는 상위 TF 상태 확인하며 홀드."
    choices:
      - action: partial_take_profit
        pct: 40
        description: "40% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  - id: lower_aligned_mid_progress
    tier: standard
    tf_alignment: lower_aligned
    progress_min: 30
    progress_max: 65
    strategy: "하위 TF 정렬 / 상위 TF 반대. 중간 진행 구간. 상위 TF 저항가를 목표로 설정. 표준 홀드."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 25
        description: "25% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # [전체 정렬] fully_aligned — 모든 TF 동일 방향
  - id: fully_aligned_high_progress
    tier: standard
    tf_alignment: fully_aligned
    progress_min: 80
    strategy: "전 TF 정렬 추세. 80%+. 강한 추세 구간. 50% 부분 익절 후 나머지 목표까지 강하게 홀드."
    choices:
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  - id: fully_aligned_mid_progress
    tier: standard
    tf_alignment: fully_aligned
    progress_min: 33
    progress_max: 79
    strategy: "전 TF 정렬 추세. 중간 진행 구간. 추세 타기 구간. 손절 지키며 목표까지 홀드 우선."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 30
        description: "30% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 4: SWING STATE (v2.0.0 신규 — A/B/C 스윙 타입 기반)
  # swing_state가 judgment_signals에 포함된 경우 활성화
  # ══════════════════════════════════════════════════

  # [C 연결스윙] 청산·리버스·진입이 일어나는 전환 구간
  - id: c_swing_initial_entry
    tier: premium
    swing_state: [C]
    progress_min: 0
    progress_max: 40
    strategy: "C 연결스윙 초기 진입. 청산·리버스 구간. 시장 방향 전환 가능성. 소규모(2~3%) 선진입. A스윙 전환 확인 전 포지션 증가 금지."
    choices:
      - action: wait
        description: "관망"
      - action: full_close
        description: "전량 청산"
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"

  - id: c_swing_mature
    tier: premium
    swing_state: [C]
    progress_min: 41
    strategy: "C 연결스윙 중반 이후. 리버스 포지션 고려. 또는 현 포지션 부분 청산 후 반대 진입 검토."
    choices:
      - action: full_close
        description: "전량 청산"
      - action: partial_take_profit
        pct: 40
        description: "40% 부분 익절"
      - action: wait
        description: "관망"

  # [B 서브스윙] 메인스윙의 반대 방향 조정 구간
  - id: b_swing_correction_end
    tier: standard
    swing_state: [B]
    progress_min: 60
    strategy: "B 서브스윙(조정) 60%+. 조정 마무리 구간. A스윙 방향 재진입 준비. 현 포지션 부분 청산 또는 A스윙 방향 신호 대기."
    choices:
      - action: partial_take_profit
        pct: 35
        description: "35% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  # [A 메인스윙] 추세의 주 방향
  - id: a_swing_strong_trend
    tier: standard
    swing_state: [A]
    progress_min: 50
    strategy: "A 메인스윙 50%+. 주 추세 방향. 홀드 우선. 진행도 기반 룰북 적용."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 25
        description: "25% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 6: MARKET STATE + PROGRESS (v1.4.0, generic보다 먼저 매칭)
  # ══════════════════════════════════════════════════

  # --- 목표 직전 (95%, 90%) ---
  - id: progress_95
    tier: premium
    progress_min: 95
    strategy: "목표 직전(95%+). 80% 부분 익절 또는 전량 청산 권장."
    choices:
      - action: partial_take_profit
        pct: 80
        description: "80% 부분 익절"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"

  - id: progress_90
    tier: standard
    progress_min: 90
    risk_appetite: [low, medium]
    strategy: "90% 이상 진행. 70% 부분 익절 제안. 나머지는 목표까지."
    choices:
      - action: partial_take_profit
        pct: 70
        description: "70% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  - id: progress_80_trend
    tier: standard
    progress_min: 80
    market_state: [trend]
    strategy: "추세 구간 80%+. 50% 부분 익절. 나머지 목표까지 홀드."
    choices:
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  - id: progress_80
    tier: standard
    progress_min: 80
    risk_appetite: [low, medium]
    strategy: "80% 이상 진행. 50% 부분 익절 후 나머지는 목표까지 홀드 권장."
    choices:
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 7: TIMEFRAME SPECIFIC + PROGRESS
  # ══════════════════════════════════════════════════

  - id: progress_66_4h
    tier: premium
    progress_min: 66
    timeframe: "4h"
    strategy: "4시간봉 66% 진행. 40% 부분 익절 제안. 큰 TF는 보수적 익절."
    choices:
      - action: partial_take_profit
        pct: 40
        description: "40% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
