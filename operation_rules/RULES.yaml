#         `tier_t1_hold_reversal_risk` (engine_action_gate=HOLD),
#         `tier_t1_watch_observe` (engine_action_gate=WATCH). 각 Tier 문구가 구별됨 (ADR-010 §2.2).
#         상의 서비스는 T1/T2 를 어댑터에서 먼저 처리하므로 본 레이어는 섀도우/직접 매칭 경로용.
# v2.4.6: FP T3.3 (cursor-fp-observation-promotion) — merge plane §2.5 observation promotion (3 keys).
#         조건키 추가: `engine_action_gate` (scalar|list, case-insensitive — GO|WATCH|HOLD),
#         `engine_ba_verdict` (scalar|list, case-insensitive — CONNECT|NO_CONNECT_NEW_C|TEST_RETRY),
#         `engine_confirmed_break` (bool). Source: migration 038 (engine_action_gate) + migration 057
#         (engine_ba_verdict, engine_confirmed_break) + merge_engine_state.py
#         `_plane_25_fields_from_semantic_tail_row`. Ref: ENGINE_TRIGGER_CONDITION_CONTRACT_SPEC §14.1,
#         docs/TRIGGER_FAILURE_PATTERN_PIPELINE_PHASE0_PLAN.md §4.3 T3.3.
# v2.4.5: WU:W10 — merge plane §2.5 RULES L1 — 로더 `_rule_matches` + 프리미엄 2개
#         (`engine_plane25_main_qkv_pass_aligned_attention`, `engine_plane25_sub_branch_qkv_fail_attention`).
#         조건키: `engine_qkv_pass`, `engine_trigger_snapshot_trigger_lane`, `engine_swing_evaluation_dominant_layer`,
#         `engine_sub_branch_qkv_pass`, `engine_conn_branch_qkv_pass`. Ref: ENGINE_TRIGGER_CONDITION_CONTRACT_SPEC §14.1.
# v2.4.4: M-B2 — rules[] 프리미엄 2개 — `engine_key_change_key_signal_applied`·`engine_key_change_confirmed` (053 merge·enrich 평면).
#         Ref: WS5_SURVEILLANCE_TRIGGER_CONTRACT.md §5.2 항목 4, SIGNAL_STATE_ENGINE_MERGE.
# v2.4.3: WP-5.3 / SC-3 — exit_policy_ref (POLICY_EXIT_EVAL_CATALOG §2 policy_id). 로더는 여전히 rules[]만 소비; 엔진 기본 trigger_forward_exit_eval=legacy 와 정합.
#         로더(M-B2): `engine_key_change_confirmed`, `engine_key_change_direction`, `engine_key_change_key_signal_applied` 조건키 — migration 053·merge·enrich 평면과 정합.
# v2.4.2: migration 052 / merge·DB 평면 — engine_dominant_layer_changed (bool), engine_dominant_layer_prev,
#         engine_manlak_shift (scalar|list, case-insensitive). Ref: operation_rules_loader, judgment_signals 052.
# v2.4.1: migration 051 / merge·DB 평면 — _rule_matches 에 engine_main_a_cycle_id (scalar|list),
#         engine_main_a_cycle_started_this_bar, engine_main_a_cycle_ended_this_bar (bool),
#         engine_winner_stem_terminated_kind (scalar|list). Ref: operation_rules_loader, judgment_signals 051.
# v2.4.0: 트리거 PnL 브릿지(W8) — merge_last_trigger_performance_into_signal_state 의 engine_trigger_exit_reason_in 등으로
#         프리미엄 룰 engine_trigger_stop_exit_attention (시뮬 stop_hit 안내; 실주문 청산 로그 아님). Ref: NEXT_SESSION_TRIGGER_PNL_EXIT_BRIDGE §0, SIGNAL_STATE_ENGINE_MERGE.
# v2.3.9: GAP-4 opposite_main_trigger_* — merge 평면 키 engine_opposite_main_trigger_candidate, engine_opposite_main_trigger_direction;
#         프리미엄 룰 engine_opposite_main_trigger_skeptic_attention (스켑틱 관망·분할; 메인 확정 게이트와 별축). Ref: SIGNAL_SKEPTIC_INPUT_SPEC §2.5, SMS_GAP4_CONSUMPTION_MATRIX.
# v2.3.8: SMS / GAP-parallel stem source — merge·DB 평면 키 engine_stem_trigger, engine_winner_stem_kind, engine_winner_stem_id (050);
#         로더 스칼라·리스트 매칭(operation_rules_loader). 프리미엄 룰 2개: 서브·연결 줄기 출처 시 중간 진행 구간 안내.
# v2.3.7: engine_connection_qkv_policy_reason — SUB_SWING_WINNER 시 main-line 연결 프리미엄 룰 제외; engine_connection_target_source DB persist.
# v2.3.6: engine_connection_qkv_verdict — merge state_snapshot.connection.qkv.verdict 평면 키; premium 룰 engine_connection_qkv_connect.
# v2.3.5: engine_sub_swing_id_min — merge engine_sub_swing_id (MODE_SEQ_V2 Facade); premium 룰 engine_sub_swing_scope_attention.
# v2.3.4: engine_c_state — merge의 state_snapshot.c_state 평면 키; progress_66 미만 구간에서 A_FORMING 전용 룰 (#4).
# v2.3.3: 엔진 합성 키 — merge 평면 키(engine_key_direction, engine_label_confidence_min, engine_event_name); v2.3.4에 engine_c_state 추가.
#         Ref: app/services/engine_core/merge_engine_state.py, operation_rules_loader._rule_matches
# v2.3.2: C2-b 배치2 — portfolio, entry_timing, tf_alignment, swing_state, portfolio_default YAML choices.
# v2.3.1: C2-b 배치1 — progress_* / progress_80_trend / TF·range 진행도 룰 전부 YAML choices (dict는 폴백용 유지).
# v2.3.0: C2-a — 일부 룰에 YAML choices 인라인 (target_reached, stop_hit, default). 로더·resolve_choices_for_rule YAML 우선.
# v2.2.0: 상의 choices를 오퍼레이션 룰 id와 정합 (operation_choice_profiles, 매칭 rule_id 단일 소스)
# v2.1.0: entry_timing 레이어 추가 (predictive, signal, confirmation)
#         레이어 순서 재정비 (9개 레이어: status/portfolio/entry_timing/tf_alignment/swing_state/market_state/tf_specific/progress/fallback)
# v2.0.0: tf_alignment 레이어 추가 (counter_trend, lower_aligned, fully_aligned, transition)
#         swing_state 레이어 추가 (A/B/C 스윙 타입 기반 규칙)
# v1.4.0: market_state 조건 추가 (breakout_early, pullback, range, trend)
# v1.3.1: portfolio_default에 portfolio_context_required 추가
# v1.3.0: 시그널 스펙 기반 샘플 확장 (progress 90/95, 1h/1d TF, 33/40, risk high)
# v1.2.0: v4 포트폴리오 스킬

# 청산 프리셋 거버넌스 (WP-5.3 / SC-3). 다정책·배치 루프는 본 ID를 상류 근거로 삼는다.
exit_policy_ref: legacy

rules:

  # ══════════════════════════════════════════════════
  # 레이어 1: STATUS (우선 처리 — 항상 먼저 매칭)
  # ══════════════════════════════════════════════════
  - id: target_reached
    tier: basic
    status: target_reached
    strategy: "목표 도달. 전량 청산 권장."
    choices:
      - action: full_close
        description: "전량 청산"

  - id: stop_hit
    tier: basic
    status: stop_hit
    strategy: "손절 구간. 청산 또는 관망 권장."
    choices:
      - action: full_close
        description: "전량 청산"
      - action: wait
        description: "관망"

  # ══════════════════════════════════════════════════
  # 레이어 2: PORTFOLIO (비중 기반 — status 다음 우선)
  # ══════════════════════════════════════════════════
  - id: portfolio_overweight
    tier: premium
    weight_diff_min: 0.10
    strategy: "비중 초과. 목표 대비 초과분 매도 권장."
    choices:
      - action: trim
        description: "초과 비중 매도"
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: full_close
        description: "전량 청산"

  - id: portfolio_underweight
    tier: premium
    weight_diff_max: -0.10
    progress_min: 50
    strategy: "비중 미달. 시그널 진행 50%+ 시 추가 매수 검토."
    choices:
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: hold
        description: "목표까지 홀드"
      - action: wait
        description: "관망"

  - id: portfolio_signal_80
    tier: premium
    weight_diff_min: -0.05
    weight_diff_max: 0.05
    progress_min: 80
    strategy: "비중 적정. 80% 진행. 50% 부분 익절 제안."
    choices:
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 3: ENTRY TIMING (v2.0.0 신규 — 진입 타이밍 모드)
  # predictive(예측): 오브젝트 형성 중 선점. 리스크 높음.
  # signal(신호): S 라벨 발생 시 표준 진입.
  # confirmation(확인): 스윙 테스트 통과 후 안전 진입.
  # entry_timing이 user_context에 없으면 이 레이어 스킵 → 하위 레이어로 fallthrough
  # ══════════════════════════════════════════════════

  # [예측 진입] predictive — 역추세에서 소규모 선점
  - id: predictive_counter_trend
    tier: premium
    entry_timing: predictive
    tf_alignment: counter_trend
    progress_min: 0
    progress_max: 30
    strategy: "예측 진입 + 역추세. 신호 미확정 구간. 소규모(1~2%). 손절 타이트. S 신호 발생 시 재평가 후 추가 진입 또는 청산."
    choices:
      - action: wait
        description: "관망"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"

  # [예측 진입] predictive — 전환 구간 선점
  - id: predictive_transition
    tier: premium
    entry_timing: predictive
    tf_alignment: transition
    strategy: "예측 진입 + 전환 구간. 상위 TF 방향 전환 가능성. 소규모(2~3%) 선점. 전환 확인 시 스케일인."
    choices:
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: wait
        description: "관망"
      - action: full_close
        description: "전량 청산"

  # [신호 진입] signal — 전 TF 정렬 표준 진입
  - id: signal_fully_aligned
    tier: standard
    entry_timing: signal
    tf_alignment: fully_aligned
    strategy: "신호 진입 + 전 TF 정렬. 표준 포지션(5~8%). 진행도 기반 룰북 적용. 강한 홀드 권장."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 30
        description: "30% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # [신호 진입] signal — 역추세 소규모 진입
  - id: signal_counter_trend
    tier: premium
    entry_timing: signal
    tf_alignment: counter_trend
    strategy: "신호 진입 + 역추세. S 신호 확인됐으나 상위 TF 반대. 소규모(2~3%). 상위 TF 저항 이전 청산 계획 필수."
    choices:
      - action: partial_take_profit
        pct: 25
        description: "25% 부분 익절"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"

  # [확인 진입] confirmation — 테스트 통과 후 안전 진입
  - id: confirmation_entry
    tier: standard
    entry_timing: confirmation
    tf_alignment: [fully_aligned, lower_aligned]
    strategy: "확인 진입. 스윙 테스트 통과 후 진입. 리스크 낮음. 포지션 표준~확대 가능. 목표까지 홀드."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 20
        description: "20% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 4: TF ALIGNMENT (v2.0.0 신규 — 다중 TF 맥락 기반)
  # 신호 TF 대비 상위 TF 방향 정렬 상태에 따른 전략
  # 포지션 크기 및 청산 타이밍 차별화
  # ══════════════════════════════════════════════════

  # [역추세] counter_trend — 고진행도: 신속 청산
  - id: counter_trend_exit_fast
    tier: premium
    tf_alignment: counter_trend
    progress_min: 60
    strategy: "역추세 신호 60%+. 상위 TF 저항 근접 구간. 즉각 60~70% 청산 권장. 나머지 손절 타이트하게 조정."
    choices:
      - action: partial_take_profit
        pct: 65
        description: "65% 부분 익절"
      - action: full_close
        description: "전량 청산"
      - action: hold
        description: "목표까지 홀드"
    # 해석: 1h A+ 신호이나 4h/1d A- 중. 60%면 상위 TF 저항가 도달 가능성 높음

  # [역추세] counter_trend — 초중기 진행: 모니터링
  - id: counter_trend_hold_monitor
    tier: premium
    tf_alignment: counter_trend
    progress_min: 0
    progress_max: 59
    strategy: "역추세 초기~중기. 상위 TF A- 구간 B/C 파동 반등 중. 목표가가 상위 TF 매도 저항가 이하인지 확인 필수. 홀드하되 상위 TF C스윙 전환 여부 지속 모니터링."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"
      - action: wait
        description: "관망"
    # 해석: 아직 목표까지 여유 있으나 상위 TF 방향이 반대. 매우 조심스러운 홀드.

  # [전환 구간] transition — 상위 TF C스윙(전환 테스트) 진행 중
  - id: transition_scale_in
    tier: premium
    tf_alignment: transition
    progress_min: 30
    strategy: "상위 TF C 연결스윙 전환 구간. 하위 TF 신호 유효. 초기 소규모 진입 유지. 상위 TF A+ 전환 확인 시 포지션 점진적 증가(스케일인) 검토."
    choices:
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"
    # 해석: 4h이 A-에서 C스윙 진입 = 4h 방향 전환 테스트 중. 유망하지만 미확인.

  - id: transition_early
    tier: premium
    tf_alignment: transition
    progress_min: 0
    progress_max: 29
    strategy: "상위 TF 전환 초입. 신호 초기 진입 구간. 소규모(2~3%) 선진입. 상위 TF 전환 확인 전 포지션 증가 금지."
    choices:
      - action: wait
        description: "관망"
      - action: scale_in
        description: "소규모 추가 진입(스케일인) 검토"
      - action: full_close
        description: "전량 청산"

  # [하위 TF 정렬] lower_aligned — 직상위 정렬, 더 큰 TF 반대
  - id: lower_aligned_high_progress
    tier: standard
    tf_alignment: lower_aligned
    progress_min: 66
    strategy: "하위 TF 정렬 / 상위 TF 반대. 66%+. 상위 TF 저항 근접 가능. 40% 부분 익절. 나머지는 상위 TF 상태 확인하며 홀드."
    choices:
      - action: partial_take_profit
        pct: 40
        description: "40% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  - id: lower_aligned_mid_progress
    tier: standard
    tf_alignment: lower_aligned
    progress_min: 30
    progress_max: 65
    strategy: "하위 TF 정렬 / 상위 TF 반대. 중간 진행 구간. 상위 TF 저항가를 목표로 설정. 표준 홀드."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 25
        description: "25% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # [전체 정렬] fully_aligned — 모든 TF 동일 방향
  - id: fully_aligned_high_progress
    tier: standard
    tf_alignment: fully_aligned
    progress_min: 80
    strategy: "전 TF 정렬 추세. 80%+. 강한 추세 구간. 50% 부분 익절 후 나머지 목표까지 강하게 홀드."
    choices:
      - action: partial_take_profit
        pct: 50
        description: "50% 부분 익절"
      - action: hold
        description: "목표까지 홀드"
      - action: full_close
        description: "전량 청산"

  - id: fully_aligned_mid_progress
    tier: standard
    tf_alignment: fully_aligned
    progress_min: 33
    progress_max: 79
    strategy: "전 TF 정렬 추세. 중간 진행 구간. 추세 타기 구간. 손절 지키며 목표까지 홀드 우선."
    choices:
      - action: hold
        description: "목표까지 홀드"
      - action: partial_take_profit
        pct: 30
        description: "30% 부분 익절"
      - action: full_close
        description: "전량 청산"

  # ══════════════════════════════════════════════════
  # 레이어 4: SWING STATE (v2.0.0 신규 — A/B/C 스윙 타입 기반)
  # swing_state가 judgment_signals에 포함된 경우 활성화
  # ══════════════════════════════════════════════════

  # [C 연결스윙] 청산·리버스·진입이 일어나는 전환 구간
