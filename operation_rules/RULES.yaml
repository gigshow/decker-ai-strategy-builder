# Decker 오퍼레이션 룰북
# progress_min, timeframe, risk_appetite 기반 전략 매칭
# API: GET /signals/{symbol}/strategy

version: "1.3.0"
updated: "2025-03-15"

rules:
  - id: target_reached
    tier: basic
    status: target_reached
    strategy: "목표 도달. 전량 청산 권장."

  - id: stop_hit
    tier: basic
    status: stop_hit
    strategy: "손절 구간. 청산 또는 관망 권장."

  - id: progress_95
    tier: premium
    progress_min: 95
    strategy: "목표 직전(95%+). 80% 부분 익절 또는 전량 청산 권장."

  - id: progress_90
    tier: standard
    progress_min: 90
    risk_appetite: [low, medium]
    strategy: "90% 이상 진행. 70% 부분 익절 제안. 나머지는 목표까지."

  - id: portfolio_overweight
    tier: premium
    weight_diff_min: 0.10
    strategy: "비중 초과. 목표 대비 초과분 매도 권장."

  - id: portfolio_underweight
    tier: premium
    weight_diff_max: -0.10
    progress_min: 50
    strategy: "비중 미달. 시그널 진행 50%+ 시 추가 매수 검토."

  - id: portfolio_signal_80
    tier: premium
    weight_diff_min: -0.05
    weight_diff_max: 0.05
    progress_min: 80
    strategy: "비중 적정. 80% 진행. 50% 부분 익절 제안."

  - id: progress_80
    tier: standard
    progress_min: 80
    risk_appetite: [low, medium]
    strategy: "80% 이상 진행. 50% 부분 익절 후 나머지는 목표까지 홀드 권장."

  - id: progress_66_4h
    tier: premium
    progress_min: 66
    timeframe: "4h"
    strategy: "4시간봉 66% 진행. 40% 부분 익절 제안. 큰 TF는 보수적 익절."

  - id: progress_66_1h
    tier: premium
    progress_min: 66
    timeframe: "1h"
    strategy: "1시간봉 66% 진행. 35% 부분 익절 제안. 단기 TF는 빠른 익절."

  - id: progress_80_1d
    tier: premium
    progress_min: 80
    timeframe: "1d"
    strategy: "일봉 80% 진행. 30% 보수적 부분 익절. 장기 TF는 홀드 선호."

  - id: progress_66
    tier: standard
    progress_min: 66
    strategy: "66% 진행. 30% 부분 익절 제안. 나머지는 목표까지 홀드."

  - id: progress_50_high
    tier: standard
    progress_min: 50
    risk_appetite: [high]
    strategy: "50% 진행. 공격적 홀드 권장. 목표까지 유지."

  - id: progress_50
    tier: standard
    progress_min: 50
    strategy: "50% 진행. 20% 부분 익절 또는 홀드. 리스크에 따라 선택."

  - id: progress_40
    tier: premium
    progress_min: 40
    risk_appetite: [low]
    strategy: "40% 진행. 보수적 10% 초기 익절 또는 홀드."

  - id: progress_33
    tier: premium
    progress_min: 33
    risk_appetite: [low]
    strategy: "33% 진행. 5% 초기 익절 또는 홀드. 리스크 낮을 때만."

  - id: portfolio_default
    tier: standard
    strategy: "현 비중 유지. 시그널별 전략 따름."

  - id: default
    tier: basic
    strategy: "진행 중. 목표 도달까지 홀드 권장."
