<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="256" height="256" role="img" aria-label="Decker Claw">
  <!-- Head: rounded shield — dark feather (#0b0f14) + accent stroke (#00d97e) -->
  <path d="M16 2 L25 6 L26 14 C26 20 22 24 16 25 C10 24 6 20 6 14 L7 6 Z"
        fill="#0b0f14" stroke="#00d97e" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Eye left — accent + dark pupil -->
  <circle cx="12" cy="12" r="2.6" fill="#00d97e"/>
  <circle cx="12" cy="12" r="0.9" fill="#06080b"/>
  <!-- Eye right -->
  <circle cx="20" cy="12" r="2.6" fill="#00d97e"/>
  <circle cx="20" cy="12" r="0.9" fill="#06080b"/>
  <!-- Beak — muted triangle -->
  <path d="M16 16 L14 19 L18 19 Z" fill="#94a3b8"/>
  <!-- Claw — 4 talons -->
  <path d="M10 26 L9 30 M13.5 26 L13 30 M18.5 26 L19 30 M22 26 L23 30"
        stroke="#00d97e" stroke-width="1.6" stroke-linecap="round" fill="none"/>
</svg>
